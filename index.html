<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Number Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 360px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .result {
      font-size: 4rem;
      font-weight: bold;
      color: #38bdf8;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .inputs {
      display: flex;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      text-align: left;
    }
    label { font-size: 0.8rem; color: #94a3b8; }
    input[type="number"] {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      width: 100%;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #38bdf8;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #7dd3fc; }
    .error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Number Generator</h1>
    <p class="subtitle">Generate a random number within a range</p>
    <div class="result" id="result">—</div>
    <div class="inputs">
      <div class="field">
        <label for="min">Min</label>
        <input type="number" id="min" value="1" />
      </div>
      <div class="field">
        <label for="max">Max</label>
        <input type="number" id="max" value="100" />
      </div>
    </div>
    <button id="generateBtn">Generate</button>
    <div class="error" id="error"></div>
  </div>
  <script src="rng.js"></script>
</body>
</html>
